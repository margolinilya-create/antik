name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Build
        run: pnpm build
      # Functional E2E only. Visual snapshots are environment-specific
      # (font anti-aliasing differs across machines) and are run locally.
      # No PLAYWRIGHT_BROWSERS_PATH override: the install step above writes to
      # the default cache (~/.cache/ms-playwright); the test run must read from
      # the same place. Setting it to "0" here pointed at node_modules/.local-
      # browsers, where nothing was installed -> "Executable doesn't exist".
      - name: E2E (functional + a11y)
        run: pnpm exec playwright test smoke.spec.ts a11y.spec.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
